<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>钧瓷 - 作品详情</title>
<style>
:root {
  --bg-main: #0d0d18;
  --bg-grad: linear-gradient(135deg, #0d0d18 0%, #1a1423 100%);
  --text-white: #f8f8ff;
  --text-gray: #c0c0d8;
  --accent-red: #c41e3a;
  --accent-gold: #d4a574;
  --accent-blue: #4a7c9b;
  --accent-grad: linear-gradient(90deg, #c41e3a, #d4a574);
  --border: rgba(255,255,255,0.1);
  --card-bg: rgba(255,255,255,0.05);
  --nav-bg: rgba(13, 13, 24, 0.85);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  background: var(--bg-grad);
  color: var(--text-white);
  line-height: 1.7;
  font-weight: 300;
  min-height: 100vh;
}

/* 莫奈油画像素背景 */
#monetBg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -2;
  background: url('https://upload.wikimedia.org/wikipedia/commons/thumb/5/59/Monet_-_Impression%2C_Sunrise.jpg/1280px-Monet_-_Impression%2C_Sunrise.jpg') center center / cover no-repeat;
  image-rendering: pixelated;
  image-rendering: -moz-crisp-edges;
  image-rendering: crisp-edges;
  filter: contrast(1.05) saturate(1.1) brightness(0.95);
  transform: scale(1.1);
}

#monetBg::after {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(13, 13, 24, 0.08);
}

/* 星空背景 */
#starCanvas {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -1;
  pointer-events: none;
}

/* 导航栏 */
.nav {
  position: fixed;
  top: 0;
  width: 100%;
  padding: 20px 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: rgba(255, 255, 255, 0.08);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  z-index: 100;
  border-bottom: 1px solid rgba(255,255,255,0.15);
  box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1), inset 0 1px 0 rgba(255, 255, 255, 0.1);
}

.nav-logo {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 24px;
  font-weight: 500;
  letter-spacing: 1px;
  text-decoration: none;
  padding: 8px 16px;
  border: 1px solid rgba(212, 165, 116, 0.3);
  border-radius: 8px;
}

.nav-logo img {
  height: 28px;
  width: auto;
  object-fit: contain;
}

.nav-logo span {
  background: var(--accent-grad);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}

.nav-back {
  display: flex;
  align-items: center;
  gap: 8px;
  color: rgba(255,255,255,0.75);
  text-decoration: none;
  font-size: 15px;
  padding: 8px 16px;
  border-radius: 8px;
  transition: all 0.3s ease;
}

.nav-back:hover {
  color: var(--text-white);
  background: rgba(255,255,255,0.05);
}

.nav-back svg {
  width: 20px;
  height: 20px;
}

/* 主容器 */
.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 120px 20px 60px;
  display: grid;
  grid-template-columns: 1fr 400px;
  gap: 60px;
  align-items: start;
}

/* 图片查看器 */
.image-viewer {
  position: relative;
  background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.04) 100%);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 20px;
  overflow: hidden;
  cursor: zoom-in;
  min-height: 500px;
  display: flex;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(20px);
}

.image-viewer img {
  max-width: 100%;
  max-height: 80vh;
  object-fit: contain;
  transition: transform 0.3s ease;
  user-select: none;
  -webkit-user-drag: none;
}

.image-viewer.zoomed {
  cursor: zoom-out;
}

.image-viewer.zoomed img {
  transform: scale(2);
}

/* 缩放提示 */
.zoom-hint {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0, 0, 0, 0.6);
  color: #fff;
  padding: 8px 16px;
  border-radius: 20px;
  font-size: 13px;
  backdrop-filter: blur(4px);
  pointer-events: none;
  opacity: 0.8;
}

/* 控制按钮 */
.controls {
  position: absolute;
  top: 20px;
  right: 20px;
  display: flex;
  gap: 10px;
}

.control-btn {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: rgba(0, 0, 0, 0.5);
  border: 1px solid rgba(255,255,255,0.1);
  color: #fff;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s ease;
  backdrop-filter: blur(4px);
}

.control-btn:hover {
  background: rgba(196, 30, 58, 0.6);
  transform: scale(1.1);
}

.control-btn svg {
  width: 20px;
  height: 20px;
}

/* 信息面板 */
.info-panel {
  background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.04) 100%);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 20px;
  padding: 40px;
  backdrop-filter: blur(20px);
}

.info-header {
  margin-bottom: 30px;
  padding-bottom: 20px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}

.info-header h1 {
  font-size: 36px;
  font-weight: 400;
  margin-bottom: 8px;
  background: var(--accent-grad);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}

.info-header .subtitle {
  color: var(--accent-gold);
  font-size: 18px;
  font-style: italic;
}

.info-description {
  margin-bottom: 30px;
}

.info-description h3 {
  font-size: 18px;
  font-weight: 400;
  color: var(--accent-gold);
  margin-bottom: 16px;
}

.info-description p {
  color: rgba(255,255,255,0.85);
  font-size: 15px;
  line-height: 1.8;
  margin-bottom: 12px;
}

.info-meta {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.meta-item {
  display: flex;
  justify-content: space-between;
  padding: 12px 0;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}

.meta-item span:first-child {
  color: rgba(255,255,255,0.75);
}

.meta-item span:last-child {
  color: var(--text-white);
}

/* 缩略图列表 */
.thumbnail-list {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-top: 30px;
  padding-top: 30px;
  border-top: 1px solid rgba(255,255,255,0.08);
}

.thumbnail-item {
  aspect-ratio: 1;
  border-radius: 8px;
  overflow: hidden;
  cursor: pointer;
  border: 2px solid transparent;
  transition: all 0.3s ease;
  background: rgba(255,255,255,0.05);
}

.thumbnail-item:hover {
  border-color: rgba(212, 165, 116, 0.5);
}

.thumbnail-item.active {
  border-color: var(--accent-gold);
}

.thumbnail-item img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* 全屏预览 */
.fullscreen-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.95);
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  visibility: hidden;
  transition: all 0.3s ease;
}

.fullscreen-overlay.active {
  opacity: 1;
  visibility: visible;
}

.fullscreen-overlay img {
  max-width: 95%;
  max-height: 95%;
  object-fit: contain;
}

.fullscreen-close {
  position: absolute;
  top: 20px;
  right: 20px;
  width: 50px;
  height: 50px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.1);
  border: none;
  color: #fff;
  font-size: 28px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s ease;
}

.fullscreen-close:hover {
  background: rgba(196, 30, 58, 0.6);
  transform: scale(1.1);
}

/* 响应式 */
@media (max-width: 992px) {
  .container {
    grid-template-columns: 1fr;
    gap: 40px;
  }
  
  .info-panel {
    order: -1;
  }
  
  .image-viewer {
    min-height: 400px;
  }
}

@media (max-width: 768px) {
  .nav {
    padding: 15px 20px;
  }
  
  .container {
    padding: 100px 20px 40px;
  }
  
  .info-panel {
    padding: 30px 20px;
  }
  
  .info-header h1 {
    font-size: 28px;
  }
  
  .thumbnail-list {
    grid-template-columns: repeat(4, 1fr);
  }
}
</style>
</head>
<body>
<!-- 莫奈背景 -->
<div id="monetBg"></div>

<!-- 星空背景 -->
<canvas id="starCanvas"></canvas>

<!-- 导航栏 -->
<nav class="nav">
  <a href="index.html" class="nav-logo">
    <img src="images/Logo无背景.png" alt="钧瓷Logo">
    <span>钧瓷</span>
  </a>
  <a href="index.html#gallery" class="nav-back">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M19 12H5M12 19l-7-7 7-7"/>
    </svg>
    返回列表
  </a>
</nav>

<!-- 主容器 -->
<div class="container">
  <!-- 图片查看器 -->
  <div class="image-viewer" id="imageViewer">
    <img src="" alt="" id="mainImage">
    <div class="controls">
      <button class="control-btn" id="zoomInBtn" title="放大">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/>
          <path d="M21 21l-4.35-4.35M11 8v6M8 11h6"/>
        </svg>
      </button>
      <button class="control-btn" id="zoomOutBtn" title="缩小">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/>
          <path d="M21 21l-4.35-4.35M8 11h6"/>
        </svg>
      </button>
      <button class="control-btn" id="fullscreenBtn" title="全屏">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
        </svg>
      </button>
    </div>
    <div class="zoom-hint">点击图片可放大，拖动查看细节</div>
  </div>
  
  <!-- 信息面板 -->
  <div class="info-panel">
    <div class="info-header">
      <h1 id="productName">毛毛</h1>
      <p class="subtitle" id="productDesc">毛绒质感，温馨可爱</p>
    </div>
    
    <div class="info-description">
      <h3>作品介绍</h3>
      <p id="productStory">这件钧瓷作品以其独特的毛绒质感而闻名，釉面呈现出细腻的纹理，如同柔软的绒毛一般。经过高温窑变，色彩自然流淌，形成了温暖而富有层次感的视觉效果。</p>
    </div>
    
    <div class="info-meta">
      <div class="meta-item">
        <span>作品名称</span>
        <span id="metaName">毛毛</span>
      </div>
      <div class="meta-item">
        <span>创作工艺</span>
        <span>传统钧瓷手工技艺</span>
      </div>
      <div class="meta-item">
        <span>烧制温度</span>
        <span>1300°C 高温窑变</span>
      </div>
      <div class="meta-item">
        <span>艺术风格</span>
        <span id="metaStyle">窑变艺术</span>
      </div>
    </div>
    
    <div class="thumbnail-list" id="thumbnailList">
      <!-- 缩略图由 JS 生成 -->
    </div>
  </div>
</div>

<!-- 全屏预览 -->
<div class="fullscreen-overlay" id="fullscreenOverlay">
  <button class="fullscreen-close" id="fullscreenClose">×</button>
  <img src="" alt="" id="fullscreenImage">
</div>

<script>
// 作品数据
const productData = [
  {
    name: '毛毛',
    desc: '毛绒质感，温馨可爱',
    story: '这件钧瓷作品以其独特的毛绒质感而闻名，釉面呈现出细腻的纹理，如同柔软的绒毛一般。经过高温窑变，色彩自然流淌，形成了温暖而富有层次感的视觉效果。每一件作品都是独一无二的艺术品，展现了钧瓷窑变的神奇魅力。',
    image: 'images/01 .png',
    style: '窑变艺术'
  },
  {
    name: '包包',
    desc: '精巧别致，匠心独运',
    story: '此件作品造型精巧别致，线条流畅优美。釉色温润如玉，在光线下呈现出变幻莫测的色彩层次。匠心独运的设计将传统钧瓷工艺与现代审美完美结合，是一件不可多得的艺术珍品。',
    image: 'images/02.png',
    style: '古典雅致'
  },
  {
    name: '牡丹',
    desc: '国色天香，富贵吉祥',
    story: '以牡丹花为设计灵感，这件钧瓷作品展现了"国色天香"的雍容华贵。釉面呈现出自然的窑变色彩，红中透紫，紫中带粉，如同盛开的牡丹花般娇艳动人。寓意富贵吉祥，是收藏与馈赠的佳品。',
    image: 'images/03.png',
    style: '富贵典雅'
  },
  {
    name: '烩烩',
    desc: '色彩斑斓，浑然天成',
    story: '这件作品是钧瓷窑变艺术的杰出代表，多种色彩在高温下自然交融，形成了色彩斑斓的独特效果。红、紫、蓝、绿交织在一起，如同绚丽的画卷，展现了钧瓷"入窑一色，出窑万彩"的神奇魅力。',
    image: 'images/04.png',
    style: '绚丽多彩'
  }
];

// 获取 URL 参数
const urlParams = new URLSearchParams(window.location.search);
const productIndex = parseInt(urlParams.get('product')) || 0;

// 当前数据
const currentProduct = productData[productIndex];

// 更新页面内容
document.getElementById('productName').textContent = currentProduct.name;
document.getElementById('productDesc').textContent = currentProduct.desc;
document.getElementById('productStory').textContent = currentProduct.story;
document.getElementById('mainImage').src = currentProduct.image;
document.getElementById('mainImage').alt = currentProduct.name;
document.getElementById('metaName').textContent = currentProduct.name;
document.getElementById('metaStyle').textContent = currentProduct.style;
document.title = `钧瓷 - ${currentProduct.name}`;

// 生成缩略图
const thumbnailList = document.getElementById('thumbnailList');
productData.forEach((product, index) => {
  const thumb = document.createElement('div');
  thumb.className = `thumbnail-item ${index === productIndex ? 'active' : ''}`;
  thumb.innerHTML = `<img src="${product.image}" alt="${product.name}">`;
  thumb.addEventListener('click', () => {
    window.location.href = `product-detail.html?product=${index}`;
  });
  thumbnailList.appendChild(thumb);
});

// 星空动画
const canvas = document.getElementById('starCanvas');
const ctx = canvas.getContext('2d');
let stars = [];

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  createStars();
}

function createStars() {
  stars = [];
  const count = Math.floor((canvas.width * canvas.height) / 8000);
  for(let i = 0; i < count; i++) {
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.2 + 0.2,
      speed: Math.random() * 0.15
    });
  }
}

function drawStars() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#fff';
  stars.forEach(star => {
    ctx.beginPath();
    ctx.arc(star.x, star.y, star.r, 0, Math.PI * 2);
    ctx.fill();
    star.y += star.speed;
    if(star.y > canvas.height) {
      star.y = 0;
      star.x = Math.random() * canvas.width;
    }
  });
  requestAnimationFrame(drawStars);
}

resizeCanvas();
drawStars();
window.addEventListener('resize', resizeCanvas);

// 图片缩放功能
const imageViewer = document.getElementById('imageViewer');
const mainImage = document.getElementById('mainImage');
let currentScale = 1;
let isDragging = false;
let startX, startY, translateX = 0, translateY = 0;

imageViewer.addEventListener('click', (e) => {
  if (currentScale === 1) {
    currentScale = 2;
    imageViewer.classList.add('zoomed');
  } else {
    currentScale = 1;
    translateX = 0;
    translateY = 0;
    imageViewer.classList.remove('zoomed');
    mainImage.style.transform = `translate(${translateX}px, ${translateY}px) scale(${currentScale})`;
  }
});

imageViewer.addEventListener('mousedown', (e) => {
  if (currentScale > 1) {
    isDragging = true;
    startX = e.clientX - translateX;
    startY = e.clientY - translateY;
  }
});

imageViewer.addEventListener('mousemove', (e) => {
  if (isDragging) {
    translateX = e.clientX - startX;
    translateY = e.clientY - startY;
    mainImage.style.transform = `translate(${translateX}px, ${translateY}px) scale(${currentScale})`;
  }
});

imageViewer.addEventListener('mouseup', () => {
  isDragging = false;
});

imageViewer.addEventListener('mouseleave', () => {
  isDragging = false;
});

// 缩放按钮
document.getElementById('zoomInBtn').addEventListener('click', () => {
  if (currentScale < 4) {
    currentScale += 0.5;
    mainImage.style.transform = `translate(${translateX}px, ${translateY}px) scale(${currentScale})`;
    imageViewer.classList.add('zoomed');
  }
});

document.getElementById('zoomOutBtn').addEventListener('click', () => {
  if (currentScale > 1) {
    currentScale -= 0.5;
    mainImage.style.transform = `translate(${translateX}px, ${translateY}px) scale(${currentScale})`;
    if (currentScale === 1) {
      translateX = 0;
      translateY = 0;
      imageViewer.classList.remove('zoomed');
      mainImage.style.transform = 'scale(1)';
    }
  }
});

// 全屏功能
const fullscreenOverlay = document.getElementById('fullscreenOverlay');
const fullscreenImage = document.getElementById('fullscreenImage');
const fullscreenClose = document.getElementById('fullscreenClose');

document.getElementById('fullscreenBtn').addEventListener('click', () => {
  fullscreenImage.src = currentProduct.image;
  fullscreenOverlay.classList.add('active');
  document.body.style.overflow = 'hidden';
});

fullscreenClose.addEventListener('click', () => {
  fullscreenOverlay.classList.remove('active');
  document.body.style.overflow = '';
});

fullscreenOverlay.addEventListener('click', (e) => {
  if (e.target === fullscreenOverlay) {
    fullscreenOverlay.classList.remove('active');
    document.body.style.overflow = '';
  }
});
</script>
</body>
</html>
